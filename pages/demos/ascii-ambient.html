<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlyphStream — ASCII Ambient</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body {
      background: linear-gradient(180deg, #0a0a12 0%, #06060a 100%);
      color: #ddd8d0;
      min-height: 100%;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    body { padding: 32px 300px 60px 32px; }
    .header { margin-bottom: 24px; }
    .header h1 { font: 600 22px/1.3 "Helvetica Neue"; color: rgba(255,255,255,0.9); margin-bottom: 4px; }
    .header p { font: 400 12px/1.5 "Helvetica Neue"; color: rgba(255,255,255,0.3); }
    .header a { color: rgba(196,163,90,0.8); text-decoration: none; }
    .header a:hover { color: #c4a35a; }
    #canvas { width: 100%; overflow: hidden; }
    .status {
      margin-top: 12px;
      font: 400 11px/1.4 "Helvetica Neue";
      color: rgba(255,255,255,0.2);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>ASCII Ambient</h1>
    <p>
      Slow, meditative ASCII art that breathes and drifts. A living background for focus and calm.
      <a href="ascii-reactive.html">← Reactive</a>
    </p>
  </div>
  <div id="canvas"></div>
  <div class="status" id="status">breathing...</div>

  <script type="module">
    import { AsciiAmbient } from '../src/components/ascii-ambient/index.ts'
    import { buildSidebar } from '../src/ui/sidebar.ts'

    const component = new AsciiAmbient('#canvas', {
      cols: 80, rows: 40, fontSize: 12,
      fontFamily: 'Georgia, serif',
      particleCount: 40, speed: 0.15, decay: 0.97,
      forceMode: 'breathe', colorMode: 'dawn',
      palette: ['#ffecd2', '#fcb69f', '#a1c4fd'],
      cycleTime: 60000, seed: 42,
    })
    component.start()

    const params = component.getParams()
    const presets = component.getPresets()
    const statusEl = document.getElementById('status')

    const sidebar = buildSidebar({
      title: 'Ambient Controls',
      presets,
      onPresetSelect: (name) => {
        component.setPreset(name)
        statusEl.textContent = `${name} — ${component.isRunning() ? 'playing' : 'paused'}`
      },
      onRegenerate: () => {
        component.regenerate(Math.floor(Math.random() * 10000))
      },
      onReset: () => {
        component.updateParams({
          cols: 80, rows: 40, fontSize: 12, fontFamily: 'Georgia, serif',
          particleCount: 40, speed: 0.15, decay: 0.97,
          forceMode: 'breathe', colorMode: 'dawn',
          palette: ['#ffecd2', '#fcb69f', '#a1c4fd'],
          cycleTime: 60000, seed: 42,
        })
        statusEl.textContent = 'dawn — playing'
      },
      controls: [
        { id: 'speed', label: 'Speed', type: 'slider', min: 0.02, max: 0.5, step: 0.01, value: params.speed,
          onChange: (v) => component.updateParams({ speed: v }) },
        { id: 'decay', label: 'Decay', type: 'slider', min: 0.9, max: 0.995, step: 0.005, value: params.decay,
          onChange: (v) => component.updateParams({ decay: v }) },
        { id: 'particleCount', label: 'Particles (rebuild)', type: 'slider', min: 10, max: 100, step: 5, value: params.particleCount,
          onChange: (v) => component.updateParams({ particleCount: v }) },
        { id: 'forceMode', label: 'Force Mode (rebuild)', type: 'select', value: params.forceMode,
          options: [
            { label: 'Breathe', value: 'breathe' },
            { label: 'Drift', value: 'drift' },
            { label: 'Gentle', value: 'gentle' },
          ],
          onChange: (v) => component.updateParams({ forceMode: v }) },
        { id: 'cycleTime', label: 'Color Cycle (s)', type: 'slider', min: 10000, max: 300000, step: 5000, value: params.cycleTime,
          onChange: (v) => component.updateParams({ cycleTime: v }) },
        { id: 'cols', label: 'Columns (rebuild)', type: 'slider', min: 30, max: 150, step: 1, value: params.cols,
          onChange: (v) => component.updateParams({ cols: v }) },
        { id: 'rows', label: 'Rows (rebuild)', type: 'slider', min: 10, max: 60, step: 1, value: params.rows,
          onChange: (v) => component.updateParams({ rows: v }) },
        { id: 'fontSize', label: 'Font Size (rebuild)', type: 'slider', min: 8, max: 20, step: 1, value: params.fontSize,
          onChange: (v) => component.updateParams({ fontSize: v }) },
        { id: 'seed', label: 'Seed (rebuild)', type: 'slider', min: 1, max: 9999, step: 1, value: params.seed,
          onChange: (v) => component.regenerate(v) },
      ],
    })
    document.body.appendChild(sidebar)
  </script>
</body>
</html>
