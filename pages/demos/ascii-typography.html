<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlyphStream — ASCII Typography</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body {
      background: linear-gradient(180deg, #0a0a12 0%, #06060a 100%);
      color: #ddd8d0;
      min-height: 100%;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    body { padding: 32px 300px 60px 32px; }
    .header { margin-bottom: 24px; }
    .header h1 { font: 600 22px/1.3 "Helvetica Neue"; color: rgba(255,255,255,0.9); margin-bottom: 4px; }
    .header p { font: 400 12px/1.5 "Helvetica Neue"; color: rgba(255,255,255,0.3); }
    .header a { color: rgba(196,163,90,0.8); text-decoration: none; }
    .header a:hover { color: #c4a35a; }
    #canvas { width: 100%; overflow: hidden; }
  </style>
</head>
<body>
  <div class="header">
    <h1>ASCII Typography</h1>
    <p>
      Variable font weights × styles rendered as ASCII art. Particle-driven brightness field
      with proportional and monospace comparison.
      <a href="ascii-flow-field.html">← Flow Field</a>
    </p>
  </div>
  <div id="canvas"></div>

  <script type="module">
    import { AsciiTypography } from '../src/components/ascii-typography/index.ts'
    import { buildSidebar } from '../src/ui/sidebar.ts'

    const component = new AsciiTypography('#canvas', {
      cols: 50, rows: 28, fontSize: 14,
      fontFamily: 'Georgia, Palatino, "Times New Roman", serif',
      weights: [300, 500, 800], styles: ['normal', 'italic'],
      particleCount: 120, attractorCount: 2, attractorMode: 'lissajous',
      decay: 0.82, colorPalette: ['#c4a35a', '#e8c96a', '#8b6914'],
      monoTint: 'rgba(130,155,210,0.7)', showSource: true, showProp: true, showMono: true,
      seed: 42,
    })
    component.start()

    const params = component.getParams()
    const presets = component.getPresets()

    const sidebar = buildSidebar({
      title: 'Typography Controls',
      presets,
      onPresetSelect: (name) => component.setPreset(name),
      onRegenerate: () => component.regenerate(Math.floor(Math.random() * 10000)),
      onReset: () => {
        component.updateParams({
          cols: 50, rows: 28, fontSize: 14, fontFamily: 'Georgia, Palatino, "Times New Roman", serif',
          weights: [300, 500, 800], styles: ['normal', 'italic'],
          particleCount: 120, attractorCount: 2, attractorMode: 'lissajous',
          decay: 0.82, colorPalette: ['#c4a35a', '#e8c96a', '#8b6914'],
          monoTint: 'rgba(130,155,210,0.7)', showSource: true, showProp: true, showMono: true,
          seed: 42,
        })
      },
      controls: [
        { id: 'decay', label: 'Decay', type: 'slider', min: 0.7, max: 0.95, step: 0.01, value: params.decay,
          onChange: (v) => component.updateParams({ decay: v }) },
        { id: 'particleCount', label: 'Particles (rebuild)', type: 'slider', min: 30, max: 300, step: 10, value: params.particleCount,
          onChange: (v) => component.updateParams({ particleCount: v }) },
        { id: 'attractorCount', label: 'Attractors (rebuild)', type: 'slider', min: 1, max: 4, step: 1, value: params.attractorCount,
          onChange: (v) => component.updateParams({ attractorCount: v }) },
        { id: 'attractorMode', label: 'Attractor Mode (rebuild)', type: 'select', value: params.attractorMode,
          options: [
            { label: 'Lissajous', value: 'lissajous' },
            { label: 'Circular', value: 'circular' },
            { label: 'Random', value: 'random' },
            { label: 'Fixed', value: 'fixed' },
          ],
          onChange: (v) => component.updateParams({ attractorMode: v }) },
        { id: 'showSource', label: 'Show Source (rebuild)', type: 'select', value: params.showSource ? 'true' : 'false',
          options: [{ label: 'Yes', value: 'true' }, { label: 'No', value: 'false' }],
          onChange: (v) => component.updateParams({ showSource: v === 'true' }) },
        { id: 'showMono', label: 'Show Monospace (rebuild)', type: 'select', value: params.showMono ? 'true' : 'false',
          options: [{ label: 'Yes', value: 'true' }, { label: 'No', value: 'false' }],
          onChange: (v) => component.updateParams({ showMono: v === 'true' }) },
        { id: 'colorMode', label: 'Color Mode', type: 'select', value: params.colorPalette.length > 1 ? 'palette' : 'mono',
          options: [{ label: 'Palette', value: 'palette' }, { label: 'Monochrome', value: 'mono' }],
          onChange: (v) => {
            if (v === 'mono') component.updateParams({ colorPalette: ['#c4a35a'] })
            else component.updateParams({ colorPalette: ['#c4a35a', '#e8c96a', '#8b6914'] })
          }},
        { id: 'monoTint', label: 'Monospace Tint', type: 'color', value: '#829bd2',
          onChange: (v) => {
            const r = parseInt(v.slice(1,3),16), g = parseInt(v.slice(3,5),16), b = parseInt(v.slice(5,7),16)
            component.updateParams({ monoTint: `rgba(${r},${g},${b},0.7)` })
          }},
        { id: 'cols', label: 'Columns (rebuild)', type: 'slider', min: 20, max: 100, step: 1, value: params.cols,
          onChange: (v) => component.updateParams({ cols: v }) },
        { id: 'rows', label: 'Rows (rebuild)', type: 'slider', min: 10, max: 50, step: 1, value: params.rows,
          onChange: (v) => component.updateParams({ rows: v }) },
        { id: 'fontSize', label: 'Font Size (rebuild)', type: 'slider', min: 8, max: 24, step: 1, value: params.fontSize,
          onChange: (v) => component.updateParams({ fontSize: v }) },
        { id: 'seed', label: 'Seed (rebuild)', type: 'slider', min: 1, max: 9999, step: 1, value: params.seed,
          onChange: (v) => component.regenerate(v) },
      ],
    })
    document.body.appendChild(sidebar)
  </script>
</body>
</html>
