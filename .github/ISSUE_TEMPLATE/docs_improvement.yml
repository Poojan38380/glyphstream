name: 📖 Documentation Improvement
description: Suggest improvements to docs, README, or examples
title: '[Docs]: '
labels: ['documentation']
body:
  - type: markdown
    attributes:
      value: |
        Help us make GlyphStream easier to use!
  - type: textarea
    id: current
    attributes:
      label: What's Missing or Unclear?
      description: Describe the documentation issue
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: How should it be improved? Feel free to draft new text.
  - type: input
    id: section
    attributes:
      label: Affected Section
      description: Which file or section? (e.g., README.md - Quick Start)
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
