name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below.
  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: What happened vs. what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Clear steps to reproduce the issue
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser & Version
      placeholder: e.g., Chrome 120
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., Windows 11, macOS 14
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console Errors
      description: Any relevant console output or screenshots
      render: shell
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else that might help
